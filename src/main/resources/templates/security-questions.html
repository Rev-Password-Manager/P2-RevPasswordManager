<!DOCTYPE html>
<html>
<head>
  <title>Security Questions - Rev Password Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0a0f1f,#0f2027,#1b3a4b,#112d4e,#0a192f);
      background-size: 400% 400%;
      animation: bgMove 20s ease infinite;
    }
    @keyframes bgMove {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }
    .wrapper { width:100%; max-width:900px; padding:20px; }
    .card {
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 30px 80px rgba(0,0,0,.65);
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.9);
      padding:40px;
    }
    h4 { text-align:center; margin-bottom:25px; font-weight:600; }
    .form-control { height:45px; border-radius:8px; margin-bottom:15px; }
    .btn-save {
      background:linear-gradient(45deg,#00c6ff,#0072ff);
      border:none;
      height:45px;
      border-radius:9px;
      font-weight:600;
      color:white;
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="card">
    <h4>Setup Security Questions</h4>
    <form id="securityForm">
      <label>Security Question 1</label>
      <select id="q1" class="form-control" required></select>
      <input id="a1" class="form-control" placeholder="Answer 1" required>

      <label>Security Question 2</label>
      <select id="q2" class="form-control" required></select>
      <input id="a2" class="form-control" placeholder="Answer 2" required>

      <label>Security Question 3</label>
      <select id="q3" class="form-control" required></select>
      <input id="a3" class="form-control" placeholder="Answer 3" required>

      <button class="btn btn-save w-100">Save Security Questions</button>
    </form>
  </div>
</div>

<script>
let userId = sessionStorage.getItem("userId");

// Load questions from DB
fetch("/api/security/questions")
  .then(response => response.json())
  .then(data => {
    ["q1","q2","q3"].forEach(id => {
      const select = document.getElementById(id);
      select.innerHTML = "<option value=''>Select Security Question</option>";
      data.forEach(q => {
        const option = document.createElement("option");
        option.value = q.questionId;
        option.textContent = q.questionText;
        select.appendChild(option);
      });
    });
  })
  .catch(err => {
    console.error("Error loading questions:", err);
    alert("Failed to load security questions");
  });

// Save answers
document.getElementById("securityForm").addEventListener("submit", function(e){
  e.preventDefault();

  if(!userId){
    alert("User session expired. Please register again.");
    window.location.href="/register";
    return;
  }

  const answers = [
    { questionId: document.getElementById("q1").value, answer: document.getElementById("a1").value },
    { questionId: document.getElementById("q2").value, answer: document.getElementById("a2").value },
    { questionId: document.getElementById("q3").value, answer: document.getElementById("a3").value }
  ];

  fetch("/api/auth/save-security-answers", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ userId:userId, answers:answers })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    window.location.href="/login";
  })
  .catch(err => {
    console.error("Error saving answers:", err);
    alert("Error saving security answers");
  });
});
</script>
</body>
</html>
