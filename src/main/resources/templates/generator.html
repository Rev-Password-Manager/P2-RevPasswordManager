<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background: #212529; color: white; padding: 20px; }
        .sidebar button { width: 100%; margin-bottom: 10px; }
        .content { padding: 30px; }

        /* Attractive card styling */
        .card {
            border-radius: 15px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            border: none;
            background: #fdfdfd;
        }
        h3 {
            color: #4e54c8;
            font-weight: 700;
        }
        .form-label { font-weight: 600; }
        .form-check-label { margin-left: 5px; font-weight: 500; }

        /* Darker checkbox borders */
        .form-check-input {
            border: 2px solid #444;
            width: 18px;
            height: 18px;
        }
        .form-check-input:checked {
            background-color: #42a5f5;
            border-color: #1e88e5;
        }
        .form-check-input:hover {
            box-shadow: 0 0 4px rgba(66,165,245,0.8);
            cursor: pointer;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(90deg, #42a5f5, #478ed1);
            border: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-primary:hover { background: linear-gradient(90deg, #1e88e5, #1565c0); }
        .btn-outline-success {
            border-radius: 10px;
            font-weight: 600;
        }

        /* Transparent password box */
        .generated-box {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            width: 70%;
            margin: 0 auto;
            border: 2px solid #42a5f5;
            border-radius: 12px;
            background: transparent;
            color: #212529;
            padding: 8px;
            box-shadow: 0 4px 10px rgba(66,165,245,0.3);
        }

        /* Smooth animation for strength bar */
        #strengthBar {
            transition: width 0.4s ease;
        }
        .generated-box {
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    border: 2px solid #42a5f5;
    border-radius: 8px;
    background: transparent;
    color: #212529;
    padding: 6px;
    box-shadow: 0 4px 10px rgba(66,165,245,0.3);
}

    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>Vault</h4>
            <button class="btn btn-outline-light" onclick="location.href='/dashboard'">Overview</button>
            <button class="btn btn-outline-light" onclick="location.href='/vault'">Password Vault</button>
            <button class="btn btn-outline-light" onclick="location.href='/generator'">Generator</button>
            <button class="btn btn-outline-light" onclick="location.href='/audit'">Security Audit</button>
            <button class="btn btn-outline-light" onclick="location.href='/backup'">Backup (Import/Export)</button>
            <button class="btn btn-outline-light" onclick="location.href='/profile'">Profile</button>
            <hr>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 content" id="mainContent">
            <h3><i class="fa-solid fa-key"></i> Password Generator</h3>
            <div class="card p-4">
                <div class="mb-3">
                    <label class="form-label">Length (8-64)</label>
                    <input type="number" id="genLength" class="form-control" value="12" min="8" max="64">
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-check">
                            <input type="checkbox" id="upper" class="form-check-input" onclick="updateStrengthIndicator()">
                            <label class="form-check-label">Include Uppercase</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" id="lower" class="form-check-input" onclick="updateStrengthIndicator()">
                            <label class="form-check-label">Include Lowercase</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check">
                            <input type="checkbox" id="numbers" class="form-check-input" onclick="updateStrengthIndicator()">
                            <label class="form-check-label">Include Numbers</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" id="special" class="form-check-input" onclick="updateStrengthIndicator()">
                            <label class="form-check-label">Include Special Characters</label>
                        </div>
                    </div>
                </div>

                <!-- Strength Indicator -->
                <div class="mt-3">
                    <label class="fw-bold">Password Strength:</label>
                    <div class="progress" style="height: 25px;">
                        <div id="strengthBar" class="progress-bar bg-secondary" role="progressbar" style="width: 10%;">
                            None Selected
                        </div>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <button class="btn btn-primary px-4" onclick="generatePassword()">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Generate
                    </button>
                </div>

                <!-- Multiple Passwords Container -->
                <div class="mt-4 text-center" id="passwordContainer">
                    <!-- Passwords with copy buttons will be injected here -->
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/js/dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
