<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Rev Password Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* ===== DARK BACKGROUND ===== */
        body{
            height:100vh;
            margin:0;
            font-family:'Segoe UI',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#0a0f1f,#0f2027,#1b3a4b,#112d4e,#0a192f);
            background-size:400% 400%;
            animation:bgMove 18s ease infinite;
        }

        @keyframes bgMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* ===== CARD ===== */
        .reset-card{
            width:430px;
            padding:35px 30px;
            border-radius:18px;
            background:rgba(255,255,255,0.80);
            backdrop-filter:blur(14px);
            box-shadow:0 25px 70px rgba(0,0,0,0.65);
            border:1px solid rgba(255,255,255,0.25);
            text-align:center;
        }

        /* shield animation */
        .lock-icon{
            width:60px;
            height:60px;
            margin:0 auto 12px auto;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:26px;
            animation:pulse 2s infinite;
        }

        @keyframes pulse{
            0%{box-shadow:0 0 0 0 rgba(0,114,255,.6);}
            70%{box-shadow:0 0 0 18px rgba(0,114,255,0);}
            100%{box-shadow:0 0 0 0 rgba(0,114,255,0);}
        }

        /* floating inputs */
        .input-group{
            position:relative;
            margin-bottom:18px;
        }

        .input-group input{
            width:100%;
            height:42px;
            border-radius:8px;
            border:1px solid rgba(0,0,0,0.2);
            padding:12px 10px;
            font-size:14px;
            outline:none;
            background:rgba(255,255,255,0.95);
            transition:.25s;
        }

        .input-group label{
            position:absolute;
            left:12px;
            top:12px;
            font-size:13px;
            color:#555;
            pointer-events:none;
            transition:.25s;
            background:white;
            padding:0 5px;
        }

        .input-group input:focus{
            border-color:#2dd4bf;
            box-shadow:0 0 0 3px rgba(45,212,191,0.35);
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label{
            top:-8px;
            font-size:11px;
            color:#0072ff;
        }

        /* password strength bar */
        .strength{
            height:6px;
            border-radius:4px;
            background:#ddd;
            margin-top:-10px;
            margin-bottom:14px;
            overflow:hidden;
        }

        .strength div{
            height:100%;
            width:0%;
            transition:.3s;
        }

        /* button */
        .btn-reset{
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            border:none;
            height:42px;
            border-radius:8px;
            font-weight:600;
            color:white;
            transition:.3s;
        }

        .btn-reset:hover{
            transform:scale(1.05);
            box-shadow:0 6px 18px rgba(0,114,255,0.5);
        }

        .small-note{
            font-size:12px;
            opacity:.7;
            margin-top:10px;
        }

    </style>
</head>

<body>

<div class="reset-card">

    <div class="lock-icon">🔒</div>
    <h4>Secure Password Reset</h4>
    <p class="small-note">Enter verification code and create a strong password</p>

    <div class="input-group">
        <input id="code" placeholder=" " required>
        <label>Reset Code</label>
    </div>

    <div class="input-group">
        <input type="password" id="newPassword" placeholder=" " required onkeyup="checkStrength()">
        <label>New Password</label>
    </div>

    <div class="strength">
        <div id="bar"></div>
    </div>

    <button onclick="reset()" class="btn btn-reset w-100">
        Reset Password
    </button>

</div>

<script>
    function reset(){
        fetch("/api/auth/reset-password",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                code:code.value,
                newPassword:newPassword.value
            })
        }).then(()=> window.location.href="/login");
    }

    /* password strength */
    function checkStrength(){
        let p=document.getElementById("newPassword").value;
        let bar=document.getElementById("bar");
        let strength=0;

        if(p.length>5) strength+=25;
        if(p.match(/[A-Z]/)) strength+=25;
        if(p.match(/[0-9]/)) strength+=25;
        if(p.match(/[@$!%*?&]/)) strength+=25;

        bar.style.width=strength+"%";

        if(strength<=25) bar.style.background="#ef4444";
        else if(strength<=50) bar.style.background="#f59e0b";
        else if(strength<=75) bar.style.background="#22c55e";
        else bar.style.background="#16a34a";
    }
</script>
<!--  improvement -->
</body>
</html>
