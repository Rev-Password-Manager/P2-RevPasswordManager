<!DOCTYPE html>
<html>
<head>
    <title>Email Verification - Rev Password Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* ---------- BACKGROUND ---------- */
        body{
            height:100vh;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;

            background:linear-gradient(135deg,#0a0f1f,#0f2027,#1b3a4b,#112d4e,#0a192f);
            background-size:400% 400%;
            animation:bgMove 18s ease infinite;
        }

        @keyframes bgMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* ---------- CARD ---------- */
        .verify-card{
            width:420px;
            padding:38px 32px;
            border-radius:18px;
            background:rgba(255,255,255,0.85);
            backdrop-filter:blur(14px);
            box-shadow:0 25px 70px rgba(0,0,0,0.65);
            border:1px solid rgba(255,255,255,0.25);
            text-align:center;
        }

        /* icon */
        .mail-icon{
            width:60px;
            height:60px;
            margin:0 auto 15px auto;
            border-radius:50%;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:26px;
            color:white;
            animation:pulse 2s infinite;
        }

        @keyframes pulse{
            0%{box-shadow:0 0 0 0 rgba(0,114,255,.6);}
            70%{box-shadow:0 0 0 18px rgba(0,114,255,0);}
            100%{box-shadow:0 0 0 0 rgba(0,114,255,0);}
        }

        h4{
            font-weight:600;
            margin-bottom:6px;
        }

        .sub{
            font-size:13px;
            opacity:.7;
            margin-bottom:20px;
        }

        /* input */
        .verify-input{
            height:46px;
            text-align:center;
            font-size:20px;
            letter-spacing:5px;
            border-radius:10px;
            border:1px solid rgba(0,0,0,.2);
            transition:.25s;
        }

        .verify-input:focus{
            border-color:#2dd4bf;
            box-shadow:0 0 0 3px rgba(45,212,191,0.35);
            transform:scale(1.03);
        }

        /* button */
        .btn-verify{
            margin-top:15px;
            height:45px;
            border-radius:10px;
            border:none;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            font-weight:600;
            color:white;
            transition:.3s;
        }

        .btn-verify:hover{
            transform:scale(1.05);
            box-shadow:0 6px 20px rgba(0,114,255,0.5);
        }

        /* timer text */
        .timer{
            font-size:12px;
            opacity:.7;
            margin-top:10px;
        }

    </style>
</head>

<body>

<div class="verify-card">

    <div class="mail-icon">✉️</div>

    <h4>Email Verification</h4>
    <div class="sub">Enter the code sent to your email</div>

    <input class="form-control verify-input mb-2"
           id="code"
           placeholder="••••••"
           maxlength="6">

    <button onclick="verify()" class="btn btn-verify w-100">
        Verify Account
    </button>

    <div class="timer" id="timer">Code expires in 60 seconds</div>

</div>

<script>
    function verify(){
        fetch("/api/auth/verify",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({code:code.value})
        }).then(()=> window.location.href="/dashboard");
    }

    /* simple countdown UI only (no backend change) */
    let time=60;
    setInterval(()=>{
        if(time>0){
            time--;
            document.getElementById("timer").innerText="Code expires in "+time+" seconds";
        }
    },1000);
</script>

</body>
</html>
<!--  improvement -->
