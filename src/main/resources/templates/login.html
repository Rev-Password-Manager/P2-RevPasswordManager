<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - RevPasswordManager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* ===== DARK BACKGROUND (same as register) ===== */
        body{
            height:100vh;
            margin:0;
            font-family:'Segoe UI',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#0a0f1f,#0f2027,#1b3a4b,#112d4e,#0a192f);
            background-size:400% 400%;
            animation:bgMove 18s ease infinite;
        }

        @keyframes bgMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* ===== MAIN CARD ===== */
        .main-card{
            height:470px;
            width:700px;
            border-radius:16px;
            overflow:hidden;
            box-shadow:0 20px 70px rgba(0,0,0,0.65);
            border:1px solid rgba(255,255,255,0.12);
        }

        /* ===== LEFT SIDE ===== */
        .left-panel{
            background:rgba(8,18,40,0.65);
            color:white;
            padding:40px 35px;
            backdrop-filter:blur(12px);
            border-right:1px solid rgba(255,255,255,0.12);
        }

        .brand{
            font-size:28px;
            font-weight:700;
        }

        .subtitle{
            font-size:14px;
            opacity:.85;
            margin-top:12px;
        }

        /* ===== RIGHT PANEL ===== */
        .right-panel{
            background:rgba(255,255,255,0.75);
            padding:40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            backdrop-filter:blur(12px);
        }

        .right-panel h3{
            text-align:center;
            margin-bottom:18px;
            font-weight:600;
        }

        /* ===== SECURITY BOX ===== */
        .security-box{
            text-align:center;
            margin-bottom:18px;
        }

        .shield{
            width:46px;
            height:46px;
            margin:0 auto 6px auto;
            background:linear-gradient(145deg,#00c6ff,#0072ff);
            clip-path:polygon(50% 0%, 90% 20%, 90% 55%, 50% 100%, 10% 55%, 10% 20%);
            animation:pulse 2s infinite;
        }

        @keyframes pulse{
            0%{box-shadow:0 0 0 0 rgba(0,114,255,.6);}
            70%{box-shadow:0 0 0 14px rgba(0,114,255,0);}
            100%{box-shadow:0 0 0 0 rgba(0,114,255,0);}
        }

        .secure-text{
            font-size:12px;
            color:#0a66c2;
            font-weight:600;
            margin-bottom:6px;
        }

        /* verification dots */
        .dots span{
            display:inline-block;
            width:6px;
            height:6px;
            background:#0072ff;
            border-radius:50%;
            margin:2px;
            animation:blink 1.4s infinite;
        }

        .dots span:nth-child(2){animation-delay:.2s;}
        .dots span:nth-child(3){animation-delay:.4s;}

        @keyframes blink{
            0%,80%,100%{opacity:.2;}
            40%{opacity:1;}
        }

        /* ===== INPUTS ===== */
        input.form-control{
            height:38px;
            border-radius:7px;
            margin-bottom:12px;
            font-size:13px;
            background:rgba(255,255,255,0.92);
            border:1px solid rgba(0,0,0,0.18);
            transition:all .25s ease;
        }

        input.form-control:focus{
            border-color:#2dd4bf;
            box-shadow:0 0 0 3px rgba(45,212,191,0.35);
            transform:scale(1.02);
        }

        /* ===== LOGIN BUTTON ===== */
        .login-btn{
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            border:none;
            height:40px;
            border-radius:7px;
            font-weight:600;
            color:white;
            transition:.3s;
        }

        .login-btn:hover{
            transform:scale(1.05);
            box-shadow:0 6px 18px rgba(0,114,255,0.5);
        }

.login-links{
    font-size:13px;
}

.forgot-link{
    text-decoration:none;
    color:#0a66c2;
    font-weight:500;
}

.forgot-link:hover{
    text-decoration:underline;
}

.signup-text{
    color:#555;
    align-content: center;
}

.signup-link{
    text-decoration:none;
    font-weight:600;
    color:#0072ff;
}

.signup-link:hover{
    text-decoration:underline;
}

    </style>
</head>

<body>

<div class="main-card row g-0">

    <!-- LEFT INFO -->
    <div class="col-md-6 left-panel">
        <div class="brand">Rev Password Manager</div>
        <div class="subtitle">Securely access your private vault</div>
    </div>

    <!-- RIGHT LOGIN -->
    <div class="col-md-6 right-panel">

        <h3>Sign In</h3>

        <div class="security-box">
            <div class="shield"></div>
            <p class="secure-text">Secured Login Environment</p>
            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <form id="loginForm">

            <input type="text" class="form-control"
                   id="usernameOrEmail"
                   placeholder="Username or Email" required>

            <input type="password" class="form-control"
                   id="password"
                   placeholder="Master Password" required>

            <button type="submit" class="btn login-btn w-100">
    Login
</button>

<div class="text-end mt-2">
    <a href="/forgot-password"
       style="font-size:13px;text-decoration:none;color:#0a66c2;">
       Forgot Password?
    </a>
</div>
</br>
<p class="signup-text">
                    Don't have an account?
                    <a href="/register" class="signup-link">
                        Create one
                    </a>
                </p>
                
        </form>

        <div id="errorMessage"
             class="alert alert-danger mt-3 d-none"></div>

    </div>

</div>

<script>
    document.getElementById("loginForm")
    .addEventListener("submit", function (event) {

        event.preventDefault();

        const loginData = {
            usernameOrEmail: document.getElementById("usernameOrEmail").value,
            password: document.getElementById("password").value
        };

        fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(loginData)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Invalid credentials");
            }
            return response.json();
        })
        .then(data => {
            sessionStorage.setItem("userId", data.userId);
            window.location.href = "/dashboard";
        })
        .catch(error => {
            const errorDiv = document.getElementById("errorMessage");
            errorDiv.classList.remove("d-none");
            errorDiv.innerText = "Login Failed: " + error.message;
        });

    });
</script>

</body>
</html>
