<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
}

.sidebar {
	height: 100vh;
	background: #212529;
	color: white;
	padding: 20px;
}

.sidebar button {
	width: 100%;
	margin-bottom: 10px;
}

.content {
	padding: 30px;
}

.section-box {
	background: white;
	padding: 25px;
	border-radius: 10px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
	margin-bottom: 30px;
}

.secret-box {
	background: #f1f6ff;
	padding: 15px;
	border-radius: 8px;
	margin-top: 15px;
	font-weight: 600;
	color: #0d6efd;
}
</style>
</head>

<body>

	<div class="container-fluid">
		<div class="row">

			<div class="col-md-2 sidebar">

				<h4>Vault</h4>

				<button class="btn btn-outline-light"
					onclick="location.href='/dashboard'">Overview</button>
				<button class="btn btn-outline-light"
					onclick="location.href='/vault'">Password Vault</button>
				<button class="btn btn-outline-light"
					onclick="location.href='/generator'">Generator</button>
				<button class="btn btn-outline-light"
					onclick="location.href='/audit'">Security Audit</button>
				<button class="btn btn-outline-light"
					onclick="location.href='/backup'">Backup (Import/Export)</button>
				<button class="btn btn-outline-light"
					onclick="location.href='/profile'">Profile</button>

				<hr>

				<button class="btn btn-danger" onclick="logout()">Logout</button>

			</div>

			<div class="col-md-10 content">

				<h3>Profile Settings</h3>

				<!-- PROFILE UPDATE -->

				<div class="section-box">

					<h5>Update Profile</h5>

					<input type="text" id="profileName" class="form-control mb-2"
						placeholder="Full Name"> <input type="email"
						id="profileEmail" class="form-control mb-2" placeholder="Email">
					<input type="text" id="profilePhone" class="form-control mb-2"
						placeholder="Phone Number"> <input type="password"
						id="newMasterPassword" class="form-control mb-3"
						placeholder="New Master Password">

					<button class="btn btn-primary" onclick="updateProfile()">Update
						Profile</button>

				</div>



				<!-- 2FA -->

				<div class="section-box">

					<h5>Two Factor Authentication (2FA)</h5>

					<button id="twofaBtn" class="btn btn-success" onclick="toggle2FA()">
						Enable 2FA</button>

					<div id="secretDisplay" class="secret-box" style="display: none">

						<span id="secretKeyText"></span>

						<button class="btn btn-sm btn-primary ms-3" onclick="copySecret()">
							Copy</button>

					</div>

					<p class="text-muted mt-2">⚠ Keep this secret key safe for
						future reference</p>

				</div>
				<!-- SECURITY QUESTIONS -->

				<!-- profile.html -->
				<div class="container mt-5">
					<h5>Security Questions</h5>
					<p>Security questions that are set for your account.</p>

					<!-- Questions list -->
					<ul id="userQuestionsList" class="list-group mb-3">
						<!-- Questions will be loaded here via JS -->
					</ul>

					<!-- Edit Button -->
					<button class="btn btn-warning" onclick="openUpdateSecurityPage()">Edit
						Security Questions</button>
				</div>

				

			</div>
		</div>
	</div>

	<!-- VERIFY PASSWORD MODAL -->

	<div class="modal fade" id="profileVerifyModal" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">Verify Master Password</h5>
					<button type="button" class="btn-close"
						onclick="closeProfileVerify()"></button>
				</div>

				<div class="modal-body">
					<input type="password" id="profileMasterPassword"
						class="form-control" placeholder="Enter Master Password">
					<p id="profileError" class="text-danger mt-2"></p>
				</div>

				<div class="modal-footer">
					<button class="btn btn-secondary" onclick="closeProfileVerify()">Cancel</button>
					<button class="btn btn-success" onclick="confirmProfileUpdate()">Verify</button>
				</div>

			</div>
		</div>
	</div>









	<script src="/js/dashboard.js"></script>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<script>

	
	function openUpdateSecurityPage(){
	    window.location.href="/updatesecurityquestions";
	}

	var twofaEnabled=false;

	function toggle2FA(){
let userId=sessionStorage.getItem("userId");

if(!twofaEnabled){

fetch("/api/auth/enable-2fa/"+userId,{method:"POST"})
.then(res=>res.json())
.then(data=>{

document.getElementById("secretDisplay").style.display="block";

document.getElementById("secretKeyText").innerText=
"Authenticator Secret Key: "+data.secret;

document.getElementById("twofaBtn").innerText="Disable 2FA";

document.getElementById("twofaBtn").classList.replace("btn-success","btn-danger");

twofaEnabled=true;

});

}else{

fetch("/api/auth/disable-2fa/"+userId,{method:"POST"})
.then(res=>res.json())
.then(data=>{

alert("2FA Disabled");

document.getElementById("secretDisplay").style.display="none";

document.getElementById("twofaBtn").innerText="Enable 2FA";

document.getElementById("twofaBtn").classList.replace("btn-danger","btn-success");

twofaEnabled=false;

});

}

}

function copySecret(){

let text=document.getElementById("secretKeyText").innerText;

navigator.clipboard.writeText(text);

alert("Secret key copied");

}



window.onload = function() {
    loadUserSecurityQuestions();
};
</script>

</body>
</html>
