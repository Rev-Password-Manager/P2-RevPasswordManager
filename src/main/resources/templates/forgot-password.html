<!DOCTYPE html>

<html>
<head>
<title>Forgot Password - Rev Password Manager</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;

background:linear-gradient(135deg,#0a0f1f,#0f2027,#1b3a4b,#112d4e,#0a192f);
}

.forgot-card{
width:420px;
padding:40px 34px;
border-radius:18px;
background:rgba(255,255,255,0.9);
box-shadow:0 25px 70px rgba(0,0,0,0.65);
text-align:center;
}

.key-icon{
width:60px;
height:60px;
margin:auto;
margin-bottom:15px;
border-radius:50%;
background:linear-gradient(45deg,#00c6ff,#0072ff);
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
color:white;
}

.option-btn{
margin-top:12px;
height:45px;
border-radius:10px;
}

.email-input{
height:46px;
border-radius:10px;
margin-top:15px;
}

</style>

</head>

<body>

<div class="forgot-card">

<div class="key-icon">🔑</div>

<h4>Forgot Password</h4>

<!-- STEP 1 -->

<div id="methodSelection">

<button onclick="showUsernameInput('security')" 
class="btn btn-outline-primary option-btn w-100">
Reset Using Security Questions </button>

<button onclick="showUsernameInput('code')" 
class="btn btn-outline-secondary option-btn w-100">
Reset Using Authentication Code </button>

</div>

<!-- STEP 2 -->

<div id="userInput" style="display:none">

<input class="form-control email-input"
id="usernameOrEmail"
placeholder="Enter Username or Email">

<button onclick="checkUser()" class="btn btn-primary w-100 mt-2">
Continue
</button>

</div>

<div id="questionsDiv"></div>
<div id="resetDiv"></div>

</div>

<script>

let userId=null
let method=""

function showUsernameInput(selectedMethod){

method=selectedMethod

document.getElementById("methodSelection").style.display="none"
document.getElementById("userInput").style.display="block"

}



function checkUser(){

fetch("/api/auth/check-user",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
usernameOrEmail:document.getElementById("usernameOrEmail").value
})

})

.then(res=>{
if(!res.ok){
throw new Error("User not found")
}
return res.json()
})

.then(data=>{

userId=data.userId

if(method==="security"){
loadSecurityQuestions()
}

if(method==="code"){

if(data.twoFactorEnabled==="Y"){
showAuthInput()
}
else{
alert("2FA not enabled for this account")
}

}

})
.catch(err=>{
	alert(err.message)
	})

	}





function showAuthInput(){

	document.getElementById("questionsDiv").innerHTML=`

	<input class="form-control mt-3"
	id="authCode"
	placeholder="Enter Authentication Code">

	<button onclick="verifyAuthCode()"
	class="btn btn-success w-100 mt-2">

	Verify Code

	</button>

	`

	}
	
function verifyAuthCode(){

	fetch("/api/auth/verify-otp",{

	method:"POST",

	headers:{"Content-Type":"application/json"},

	body:JSON.stringify({

	userId:userId,
	otp:document.getElementById("authCode").value

	})

	})

	.then(res=>res.json())

	.then(data=>{

	if(data.valid){

	alert("Authentication Code Verified")
	showResetPassword()

	}else{

	alert("Invalid Authentication Code")

	}

	})

	}














function loadSecurityQuestions(){

	fetch("/api/auth/security-questions/"+userId)

	.then(res=>res.json())

	.then(data=>{

	console.log("Questions from API:",data)

	let html="<div class='mt-3 text-start'>"

	if(!data || data.length===0){
	html+="<p>No security questions found.</p>"
	}

	data.forEach((q,i)=>{

	let questionText = "Security Question";

	if(q.question && q.question.questionText){
	questionText = q.question.questionText;
	}

	html+=`
	<p><b>${questionText}</b></p>
	<input class="form-control mb-2" id="ans${i}" placeholder="Enter answer">
	`

	})

	html+=`<button onclick="submitAnswers()" class="btn btn-success w-100">
	Submit Answers
	</button></div>`

	document.getElementById("questionsDiv").innerHTML=html

	})

	.catch(err=>{
	console.error(err)
	alert("Failed to load security questions")
	})

	}

function submitAnswers(){
	  let answers = [];
	  document.querySelectorAll("input[id^='ans']").forEach(x=>{
	    answers.push(x.value);
	  });

	  fetch("/api/auth/validate-security-answers", {
	    method:"POST",
	    headers:{"Content-Type":"application/json"},
	    body:JSON.stringify({ userId:userId, answers:answers })
	  })
	  .then(async res => {
	    const data = await res.json();

	    if(!res.ok){
	      // ❌ Incorrect answers
	      alert(data.message);
	      return; // stop here
	    }

	    // ✅ Correct answers
	    alert(data.message);
	    showResetPassword();
	  })
	  .catch(err => {
	    alert("Something went wrong: " + err.message);
	  });
	}



function showResetPassword(){

document.getElementById("resetDiv").innerHTML=`

<input type="password" id="newPassword"
class="form-control mt-3"
placeholder="Enter New Password">

<button onclick="resetPassword()"
class="btn btn-primary w-100 mt-2">

Reset Password

</button>

`

}


function resetPassword(){

fetch("/api/auth/reset-password",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

userId:userId,
newPassword:document.getElementById("newPassword").value

})

})

.then(res=>res.json())

.then(data=>{

alert(data.message)

window.location.href="/login"

})

}


	
	
</script>

</body>
</html>
