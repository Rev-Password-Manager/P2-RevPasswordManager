<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Audit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background: #212529; color: white; padding: 20px; }
        .sidebar button { width: 100%; margin-bottom: 10px; }
        .content { padding: 40px; }

        /* Card styling */
        .card {
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: none;
            background: #ffffff;
        }

        h3 {
            color: #4e54c8;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Section headings with emojis + badges */
        .audit-section {
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .audit-section h5 {
            font-weight: 700;
            margin-top: 20px;
            display: flex;
            align-items: center;
            font-size: 1.2rem;
        }

        .audit-section p {
            margin-left: 30px;
            padding: 6px 0;
            font-size: 1rem;
            border-left: 3px solid transparent;
            padding-left: 10px;
        }

        .strength-weak {
            color: #dc3545;
            border-color: #dc3545;
        }

        .strength-medium {
            color: #fd7e14;
            border-color: #fd7e14;
        }

        .strength-strong {
            color: #28a745;
            border-color: #28a745;
        }

        .emoji {
            margin-right: 8px;
            font-size: 1.4rem;
        }

        .badge {
            margin-left: 10px;
            font-size: 0.85rem;
            padding: 5px 8px;
        }
    </style>
</head>
//this page is for auditing //
<body>
<div class="container-fluid">
    <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>Vault</h4>
            <button class="btn btn-outline-light" onclick="location.href='/dashboard'">Overview</button>
            <button class="btn btn-outline-light" onclick="location.href='/vault'">Password Vault</button>
            <button class="btn btn-outline-light" onclick="location.href='/generator'">Generator</button>
            <button class="btn btn-outline-light" onclick="location.href='/audit'">Security Audit</button>
            <button class="btn btn-outline-light" onclick="location.href='/backup'">Backup (Import/Export)</button>
            <button class="btn btn-outline-light" onclick="location.href='/profile'">Profile</button>
            <hr>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 content" id="mainContent">
            <h3 class="mb-4"><i class="fa-solid fa-shield-halved"></i> Security Audit Report</h3>
            <div id="auditReport" class="card p-4">
                <!-- Dynamic content injected by dashboard.js -->
                <!-- Example after loadAuditReport runs:
                <div class="audit-section">
                    <h5><span class="emoji">🔴</span> Weak Passwords <span class="badge bg-danger">Weak</span></h5>
                    <p class="strength-weak">Instagram (user@example.com)</p>
                </div>
                <div class="audit-section">
                    <h5><span class="emoji">🟠</span> Reused Passwords <span class="badge bg-warning text-dark">Reused</span></h5>
                    <p class="strength-medium">None</p>
                </div>
                <div class="audit-section">
                    <h5><span class="emoji">🟢</span> Old Passwords (90+ days) <span class="badge bg-success">Old</span></h5>
                    <p class="strength-strong">None</p>
                </div>
                -->
            </div>
        </div>
    </div>
</div>
<script src="/js/dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
